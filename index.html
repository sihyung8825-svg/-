<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Hell Parry Boss</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: Arial; }
        #ui { position: fixed; top: 10px; left: 10px; pointer-events: none; }
        canvas { display: block; margin: 0 auto; background: #111; cursor: none; }
        .stat { margin-bottom: 5px; font-size: 18px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">시간: <span id="time">0</span>s</div>
    <div class="stat">점수: <span id="score">0</span></div>
    <div class="stat">패링 쿨: <span id="cool">0</span>s</div>
</div>

<canvas id="game" width="600" height="800"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player = { x: 300, y: 700, size: 8, parry: false };
let bullets = [];
let mouse = { x: 300, y: 700 };
let score = 0;
let parryCount = 0;
let startTime = Date.now();
let lastParry = 0;
let isGameOver = false;

const parryCooldown = 3000; // 5초는 너무 길어서 3초로 조정
const parryDuration = 200;  // 판정 지속시간 (너무 길면 무적기처럼 느껴짐)

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', () => {
    const now = Date.now();
    if (now - lastParry > parryCooldown && !isGameOver) {
        player.parry = true;
        lastParry = now;
        setTimeout(() => player.parry = false, parryDuration);
    }
});

function spawnBullet(difficulty) {
    bullets.push({
        x: Math.random() * canvas.width,
        y: 0,
        vx: (Math.random() - 0.5) * difficulty,
        vy: 2 + difficulty * 0.5,
        parried: false,
        radius: 5
    });
}

function spawnCirclePattern(cx, cy, count, speed) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        bullets.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            parried: false,
            radius: 6
        });
    }
}

function update() {
    if (isGameOver) return;

    player.x += (mouse.x - player.x) * 0.2;
    player.y += (mouse.y - player.y) * 0.2;

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;

        let dx = b.x - player.x;
        let dy = b.y - player.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        // 충돌 판정 (플레이어 크기 + 총알 크기)
        if (dist < player.size + b.radius) {
            if (player.parry && !b.parried) {
                // 패링 성공: 속도 반전 및 강화
                b.vx *= -2;
                b.vy *= -2;
                b.parried = true;
                parryCount++;
            } else if (!b.parried) {
                // 피격
                gameOver();
            }
        }

        // 화면 밖으로 나간 총알 제거
        if (b.x < -100 || b.x > 700 || b.y < -100 || b.y > 900) {
            bullets.splice(i, 1);
        }
    }
}

function gameOver() {
    isGameOver = true;
    setTimeout(() => {
        alert(`게임 오버! 최종 점수: ${score}`);
        location.reload();
    }, 10);
}

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 패링 범위 시각화 (선택 사항)
    if (player.parry) {
        ctx.strokeStyle = 'cyan';
        ctx.beginPath();
        ctx.arc(player.x, player.y, 30, 0, Math.PI * 2);
        ctx.stroke();
    }

    // 플레이어
    ctx.fillStyle = player.parry ? 'cyan' : 'white';
    ctx.shadowBlur = player.parry ? 15 : 0;
    ctx.shadowColor = 'cyan';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 총알
    bullets.forEach(b => {
        ctx.fillStyle = b.parried ? '#0ff' : '#f44';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
    });
}

let frameCount = 0;
function loop() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const difficulty = 1 + elapsed * 0.1;

    frameCount++;

    if (!isGameOver) {
        if (frameCount % Math.max(2, Math.floor(10 / difficulty)) === 0) {
            spawnBullet(difficulty);
        }
        if (frameCount % 180 === 0) {
            spawnCirclePattern(canvas.width / 2, 200, 12 + Math.floor(difficulty * 2), 2 + difficulty * 0.3);
        }

        update();
        draw();

        score = (elapsed * 10) + (parryCount * 50);

        document.getElementById('time').textContent = elapsed;
        document.getElementById('score').textContent = score;
        let coolLeft = Math.max(0, ((parryCooldown - (Date.now() - lastParry)) / 1000)).toFixed(1);
        document.getElementById('cool').textContent = coolLeft;
    }

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
